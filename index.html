<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ôn Địa HKII</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <div class="hero-copy">
        <p class="eyebrow">Web ôn tập địa lí HKII</p>
        <h1>Ôn trắc nghiệm và đúng/sai </h1>
        <div class="hero-chips">
          <span id="chipTotalQuestions" class="chip">0 câu</span>
          <span id="chipMcq" class="chip">0 câu ABCD</span>
          <span id="chipTf" class="chip">0 mệnh đề đúng/sai</span>
        </div>
      </div>
      <div class="hero-panel">
        <div class="hero-stat">
          <span class="stat-label">Điểm gần nhất</span>
          <strong id="lastScore">Chưa làm</strong>
        </div>
        <div class="hero-stat">
          <span class="stat-label">Điểm cao nhất</span>
          <strong id="bestScore">Chưa có</strong>
        </div>
        <div class="hero-stat">
          <span class="stat-label">Câu đang hiển thị</span>
          <strong id="sessionCount">0</strong>
        </div>
      </div>
    </header>

  </div>

  <script src="./quiz-data.js"></script>
  <script src="./script.js"></script>
</body>
</html>
